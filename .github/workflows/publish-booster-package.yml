name: Build & Publish Booster Package

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      upload_asset:
        description: 'Upload package as release asset'
        required: true
        default: 'true'

jobs:
  build-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build booster package
        run: |
          cd booster
          bash package-release.sh /tmp/booster-package
          ls -lh /tmp/booster-package/booster.zip

      - name: Upload package as release asset
        if: github.event_name == 'release' || github.event.inputs.upload_asset == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/booster-package/booster.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Booster Package Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Package built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**File:** booster.zip" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -h /tmp/booster-package/booster.zip | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** Attached to GitHub release" >> $GITHUB_STEP_SUMMARY

  build-test-fixtures:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-fixtures-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-fixtures-
            ${{ runner.os }}-composer-

      - name: Build test fixtures
        run: |
          chmod +x tools/build-fixtures.sh
          bash tools/build-fixtures.sh /tmp/fixtures

      - name: Upload fixtures as release assets
        if: github.event_name == 'release' || github.event.inputs.upload_asset == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/fixtures/laravel-fixture.tar.gz
            /tmp/fixtures/symfony-fixture.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Test Fixtures Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Fixtures built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Size | File |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Laravel | $(du -h /tmp/fixtures/laravel-fixture.tar.gz | cut -f1) | laravel-fixture.tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| Symfony | $(du -h /tmp/fixtures/symfony-fixture.tar.gz | cut -f1) | symfony-fixture.tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** Attached to GitHub release" >> $GITHUB_STEP_SUMMARY
